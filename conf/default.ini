#include "pipeline5.ini"
#include "xiangshan.ini"
#include "cache.ini"
#include "bus.ini"
#include "gpu_sm.ini"

[root]
cpu_type=gpu_sm
operation=mp_gpu_sm
thread_num=1
barrier_wait_interval=1
log_lock_wait_interval=64
out_dir=out
core_path=core.txt
global_freq_mhz=1000
wall_time_freq_mhz=1
rand_seed=1919810

[workload]
stack_size_mb=32
ld_path=/usr/riscv64-linux-gnu/lib

[sys]
log_ecall_to_stdout=0
log_info_to_stdout=0
log_file=logs/gpusm.log
sch_lock_wait_interval=64
log_print_init_stack_layout=0
cpu_type=gpu_sm

[multicore]
cpu_number=1
mem_size_mb=4096
mem_node_num=1

[mem]
log_info_to_stdout=0
memory_access_buf_size=4
